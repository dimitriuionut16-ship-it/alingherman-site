    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --white: #FFFFFF;
            --cream: #FDFBF7;
            --burgundy: #6B1B3D;
            --grey: #6B7280;
            --grey-light: #E5E7EB;
            --text-dark: #1F2937;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            line-height: 1.6;
            font-weight: 300;
            -webkit-font-smoothing: antialiased;
        }
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(253,251,247,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--grey-light);
        }
        .nav-content {
            max-width: 1400px; margin: 0 auto; padding: 20px 48px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo { font-size: 14px; font-weight: 500; letter-spacing: 2px; color: var(--burgundy); text-decoration: none; }
        .back-btn {
            display: flex; align-items: center; gap: 8px;
            font-size: 11px; font-weight: 500; letter-spacing: 1.5px;
            text-transform: uppercase; text-decoration: none;
            color: var(--burgundy); border: 1px solid var(--burgundy);
            padding: 10px 20px; background: transparent; transition: all 0.25s;
        }
        .back-btn:hover { background: var(--burgundy); color: var(--white); }
        .back-btn svg { width: 14px; height: 14px; transition: transform 0.3s; }
        .back-btn:hover svg { transform: translateX(-3px); }
        .hero { padding: 160px 48px 80px; max-width: 1400px; margin: 0 auto; text-align: center; }
        .hero-label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--turquoise); margin-bottom: 16px; }
        .hero-title { font-family: 'Instrument Serif', serif; font-size: clamp(36px, 5vw, 64px); font-weight: 400; color: var(--burgundy); margin-bottom: 16px; }
        .hero-divider { width: 40px; height: 2px; background: var(--burgundy); margin: 8px auto 0; }
        .gallery-section { padding: 40px 0 100px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 48px; }
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 48px 36px; }
        
        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .nav-content { padding: 14px 24px !important; }
            .back-btn { padding: 8px 16px; font-size: 11px; }
            .container, .container-narrow { padding: 0 24px !important; }
            .hero { padding: 100px 24px 48px !important; min-height: auto !important; }
            .hero-title { font-size: clamp(28px, 8vw, 48px) !important; }
            .footer-content { flex-direction: column !important; gap: 12px !important; text-align: center !important; }
            section { padding: 60px 0 !important; }
        }
        @media (max-width: 480px) {
            .nav-content { padding: 12px 16px !important; }
            .container, .container-narrow { padding: 0 16px !important; }
        }

            .nav-content { padding: 16px 24px; }
            .container { padding: 0 24px; }
            .hero { padding: 120px 24px 60px; }
        }
        .photo-item img {
            border: 1px solid rgba(107,27,61,0.45); width: 100%; height: auto; display: block; }
        .photo-caption { margin-top: 14px; }
        .caption-name {
            text-align: center; display: block; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--burgundy); margin-bottom: 4px; }
        .caption-detail { display: block; font-size: 13px; color: var(--grey); font-style: italic; }
        .footer { padding: 48px 0; background: var(--burgundy); color: var(--white); }
        .footer-content { display: flex; justify-content: space-between; align-items: center; }
        .footer-brand { font-size: 13px; font-weight: 500; letter-spacing: 2px; color: var(--white); }
        .footer-note { font-size: 12px; color: rgba(255,255,255,0.7); }
    </style>
